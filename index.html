<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ผลประเมิน How's My Heart?</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css">
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, "Segoe UI", "Noto Sans Thai", sans-serif;
    background: #f0f0f0;
    margin: 0;
    padding: 24px 12px;
    display: flex;
    justify-content: center;
  }
  .card {
    background: #ffffff;
    border-radius: 16px;
    padding: 20px;
    width: 100%;
    max-width: 340px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.08);
  }
  .title { font-size: 15px; font-weight: 600; margin: 0 0 4px; color: #222; }
  .label-row { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
  .label-row i { font-size: 20px; }
  .label-text { font-size: 17px; font-weight: 600; }
  .score-line { font-size: 13px; color: #999; margin: 0 0 12px; }
  .divider { border-top: 1px solid #eee; padding-top: 12px; margin-bottom: 12px; }
  .body-text { font-size: 14px; color: #555; line-height: 1.6; margin: 0; }
  .hotline-box {
    border-radius: 8px;
    padding: 8px 12px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .hotline-box i { font-size: 16px; }
  .hotline-box span { font-size: 13px; }
  .buttons { display: flex; flex-direction: column; gap: 10px; }
  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 12px 14px;
    border-radius: 12px;
    border: 1.5px solid #1a1a1a;
    background: #fff;
    color: #1a1a1a;
    font-size: 15px;
    font-weight: 500;
    text-decoration: none;
  }
  .btn i { font-size: 18px; }
  .btn.primary { border: 1.5px solid transparent; }
  .btn.disabled { opacity: 0.45; pointer-events: none; }
  .loading { font-size: 14px; color: #999; text-align: center; padding: 40px 0; }
</style>
</head>
<body>
  <div class="card" id="card">
    <p class="loading">กำลังโหลด...</p>
  </div>

<script>
/*
  วิธีใส่ URL ให้แต่ละปุ่ม:
  เพิ่ม key "url": "https://..." ในปุ่มที่ต้องการ เช่น
    { label: "ดนตรีบำบัด", icon: "ti-music", url: "https://open.spotify.com/playlist/xxxx" }

  ปุ่มที่ยังไม่มี url และไม่มี tel จะกดไม่ได้ (แสดงจางลงเป็น disabled)
  แทนที่จะเป็นลิงก์ค้าง href="#" เหมือนเดิม กันคนกดแล้วงง
*/
const bands = [
  { max: 4,  label: "ปกติ / ไม่มีภาวะซึมเศร้า", color: "#639922",
    body: "คะแนนของคุณอยู่ในเกณฑ์ปกติ ดูแลสุขภาพใจต่อไปนะครับ/คะ", hotline: false,
    actions: [
      { label: "นอนหลับให้เพียงพอ", icon: "ti-moon" },
      { label: "ออกกำลังกายสม่ำเสมอ", icon: "ti-run" }
    ] },
  { max: 9,  label: "เศร้าเล็กน้อย", color: "#BA7517",
    body: "มีสัญญาณความเศร้าเล็กน้อย ลองพูดคุยกับคนใกล้ชิดดูนะครับ/คะ", hotline: false,
    actions: [
      { label: "เล่าให้คนที่ไว้ใจฟัง", icon: "ti-message-circle" },
      { label: "ทำกิจกรรมที่ชอบ", icon: "ti-mood-smile" }
    ] },
  { max: 14, label: "เศร้าปานกลาง", color: "#D85A30",
    body: "เราเป็นห่วงคุณ ลองปรึกษาครูแนะแนวหรือผู้ปกครองดูนะครับ/คะ", hotline: false,
    actions: [
      { label: "ปรับสมดุลการนอน/กิน", icon: "ti-apple" },
      { label: "ดนตรีบำบัด", icon: "ti-music", url: "https://drive.google.com/file/d/1A90D5a8S_PBeSxdMR5sbZmvigF8n2xt9/view?usp=sharing" },
      { label: "ปรับสมดุลสมอง", icon: "ti-atom-2", url: "https://drive.google.com/file/d/1Iz7PlJqJ_ULdAlUi895S6K0xJz2tKcX4/view?usp=sharing" }
    ] },
  { max: 19, label: "เศร้ารุนแรง", color: "#A32D2D",
    body: "เราเป็นห่วงคุณมากๆ อยากให้ได้พูดคุยกับผู้เชี่ยวชาญโดยเร็ว", hotline: true,
    actions: [
      { label: "ดนตรีบำบัด", icon: "ti-music", url: "https://drive.google.com/file/d/1A90D5a8S_PBeSxdMR5sbZmvigF8n2xt9/view?usp=sharing" },
      { label: "ปรับสมดุลสมอง", icon: "ti-atom-2", url: "https://drive.google.com/file/d/1Iz7PlJqJ_ULdAlUi895S6K0xJz2tKcX4/view?usp=sharing" },
     { label: "อยากระบาย", icon: "ti-message-circle" },
      { label: "ติดต่อ 1323", icon: "ti-phone", tel: "1323", primary: true }
    ] },
  { max: Infinity, label: "เศร้ารุนแรงค่อนข้างมาก", color: "#A32D2D",
    body: "เราเป็นห่วงคุณมากๆ อยากให้ได้พูดคุยกับผู้เชี่ยวชาญโดยเร็ว ทางโรงเรียน/เจ้าหน้าที่จะติดต่อกลับไปเพื่อดูแลคุณ", hotline: true,
    actions: [
      { label: "ดนตรีบำบัด", icon: "ti-music", url: "https://drive.google.com/file/d/1A90D5a8S_PBeSxdMR5sbZmvigF8n2xt9/view?usp=sharing" },
      { label: "ปรับสมดุลสมอง", icon: "ti-atom-2", url: "https://drive.google.com/file/d/1Iz7PlJqJ_ULdAlUi895S6K0xJz2tKcX4/view?usp=sharing" },
      { label: "อยากระบาย", icon: "ti-message-circle" },
      { label: "ติดต่อ 1323", icon: "ti-phone", tel: "1323", primary: true }
    ] }
];

function bandFor(score) {
  return bands.find(b => score <= b.max) || bands[bands.length - 1];
}

function render() {
  const params = new URLSearchParams(window.location.search);
  let score = 0;
  let name = "";
  if (params.get("d")) {
    // รูปแบบใหม่: พารามิเตอร์ตัวเดียว d = base64("คะแนน|ชื่อ")
    try {
      const decoded = atob(decodeURIComponent(params.get("d")));
      const sepIndex = decoded.indexOf("|");
      score = Number(decoded.slice(0, sepIndex)) || 0;
      name = decoded.slice(sepIndex + 1) || "";
    } catch (e) {
      score = 0; name = "";
    }
  } else {
    // รูปแบบเดิม: ?score=..&name=.. (ยังใช้ได้เผื่อลิงก์เก่า)
    score = Number(params.get("score")) || 0;
    name = params.get("name") ? decodeURIComponent(params.get("name")) : "";
  }
  const band = bandFor(score);

  const hotlineHtml = band.hotline ? `
    <div class="hotline-box" style="background:${band.color}18;">
      <i class="ti ti-phone" style="color:${band.color}"></i>
      <span style="color:${band.color}">สายด่วนสุขภาพจิต 1323 (โทรฟรีตลอด 24 ชม.)</span>
    </div>` : "";

  const buttonsHtml = band.actions.map(a => {
    const hasLink = Boolean(a.tel || a.url);
    const href = a.tel ? `tel:${a.tel}` : (a.url || "#");
    const target = (!a.tel && a.url) ? ' target="_blank" rel="noopener"' : "";
    const style = a.primary
      ? `background:${band.color};color:#fff;border-color:${band.color};`
      : "";
    const classes = `btn${a.primary ? " primary" : ""}${hasLink ? "" : " disabled"}`;
    return `<a href="${href}"${target} class="${classes}" style="${style}">
      <i class="ti ${a.icon}"></i>${a.label}
    </a>`;
  }).join("");

  document.getElementById("card").innerHTML = `
    <p class="title">ผลประเมิน How's My Heart?</p>
    <div class="label-row">
      <i class="ti ti-heart" style="color:${band.color}"></i>
      <span class="label-text" style="color:${band.color}">${band.label}</span>
    </div>
    <p class="score-line">${name ? name + " &middot; " : ""}คะแนนรวม: ${score}/27</p>
    <div class="divider">
      <p class="body-text">${band.body}</p>
    </div>
    ${hotlineHtml}
    <div class="buttons">${buttonsHtml}</div>
  `;
}

render();
</script>
</body>
</html>
