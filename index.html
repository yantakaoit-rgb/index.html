<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ปุ่มการดูแล 4 ปุ่ม</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css">
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, "Segoe UI", "Noto Sans Thai", sans-serif;
    background: #f0f0f0;
    margin: 0;
    padding: 24px 12px;
    display: flex;
    justify-content: center;
  }
  .buttons {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    max-width: 320px;
  }
  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 12px 14px;
    border-radius: 12px;
    border: 1.5px solid #1a1a1a;
    background: #fff;
    color: #1a1a1a;
    font-size: 15px;
    font-weight: 500;
    text-decoration: none;
  }
  .btn i { font-size: 18px; }
  .btn.primary {
    border: 1.5px solid transparent;
    background: #A32D2D;
    color: #ffffff;
  }
</style>
</head>
<body>
  <div class="buttons">
    <a href="#" class="btn">
      <i class="ti ti-music"></i>ดนตรีบำบัด
    </a>
    <a href="#" class="btn">
      <i class="ti ti-atom-2"></i>ปรับสมดุลสมอง
    </a>
    <a href="#" class="btn">
      <i class="ti ti-message-circle"></i>อยากระบาย
    </a>
    <a href="tel:1323" class="btn primary">
      <i class="ti ti-phone"></i>ติดต่อ 1323
    </a>
  </div>
</body>
</html>
